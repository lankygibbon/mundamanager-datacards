 (before modifiers) always succeeds.","Combi":"A combi-weapon has 2 profiles. When fired, pick a profile for the attack.","Concussion":"-2 Initiative/Handling (minimum 6+) until the end of the round.","Crew Operated":"Vehicle-mounted weapon operated by vehicle crew, usable during vehicle's activation. Use the BS characteristic of the crew. Unwieldy trait doesn't apply.","Cursed":"When hit, pass a Willpower test or become Insane.","Deflagrate":"If the weapon wounds, deals another 1 automatic hit with the same weapon profile.","Defoliate":"Deals D3 Damage to Carnivorous Plants.","Demolitions":"Can use the Grenade in close combat attacks against scenery targets (doors/objectives).","Digi":"Can be used in addition to any other Melee weapons, granting an additional close combat attack.","Drag":"If hit (and not taking the target Out of Action), the target can be dragged closer to the attacker.","Entangle":"Hits from Entangle weapons cannot be parried. If the hit roll is a natural 6, Reaction attacks against the attacker suffer an additional -2 to hit.","Esoteric":"Cannot be given any Weapon Accessories, upgraded or modified in any way.","Fear":"Instead of suffering an Injury roll, the target must pass a Nerve test with a -2 modifier or immediately become Broken (run for cover).","Firestorm (X)":"When a Firestorm weapon hits, the nearest model suffers a number of hits equal to bullet holes rolled on the Firepower dice. Roll up to X Firepower dice. Make an Ammo check for each Ammo symbol\u2014fail 1 and the weapon is Out of Ammo, fail 2+ and it jams for the rest of the battle.","Fixed":"Represented by a weapon on its own base (not equipped by a fighter).","Flare":"A fighter hit becomes Revealed (if in darkness).","Flash":"Instead of making a wound roll for models hit, pass an Initiative/Handling test or become subject to the Blind condition.","Force":"When wielded by a Psyker, gain Power and Sever traits","Gas":"Instead of making a wound roll, roll equal to or higher than the Toughness to inflict an Injury roll.","Graviton Pulse":"Instead of making a wound roll, pass a Strength test or suffer Damage. No save roll can be made.","Grenade":"Grenades are Wargear (not a weapon), but treated as a special type of ranged weapon that can be thrown as a Shoot (Basic) action.","Gunk":"Gain the Gunk condition: -1\\\" M, no additional M when charging, -1 to Initative tests, catch fire on 2+ when hit with Blaze.","Haemophagic":"When resolving a Toxin attack with this weapon, apply a +1 modifier if this weapon has previously hit the target.","Haywire":"When hitting a vehicle, roll a D6 instead of wounding normally, on a 4+, it is wounded. If the weapon has Strength *, it cannot harm fighters or pin them. Otherwise, resolve hits as normal.","Hexagrammatic":"Hits ignore Psychic power saves. 2x damage against Psykers.","Impale":"If a target is wounded, the projectile continues through and can hit another fighter.","Knockback":"If the hit roll meets or beats the target's Strength, they are pushed 1\" away. Add +1 Damage if blocked by terrain or model. Blast weapons push from the marker's centre; use Scatter dice if centred. Melee attackers may follow up unless attacking over a barricade. Test Initiative if pushed off edge.","Lance":"+1S while Mounted when Charging or Ride By.","Lance-bomb":"First successful hit uses the 'Primed' profile, all other this battle use the 'Spent' profile.","Limited":"When limited ammo run out, that type is permanently lost and can't be used again until more is purchased.","Master-crafted":"Once per battle, re-roll a single failed hit roll.","Melee":"Applies to all weapons with range E (Engaged). Can be used during close combat attacks.","Melta":"Applies to short range hits (or any hit if there is no short range): If reduced to 0 Wounds, any Injury dice are automatically Out of Action (no need to roll).","Paired":"Counts as being equipped with dual Melee weapons when calculating the number of Attack dice.  When charging, Attack characteristic is doubled. Mounted fighters do not benefit from this trait.","Passenger Operated":"Vehicle-mounted weapon operated by fighters other than the Crew, usable during a fighter's activation if within 1\" of the weapon. Cannot be fired more than once per round. Unwieldy trait doesn't apply.","Phase":"Ignore saves from armour and field armour (saves from special rules can still be used).","Plentiful":"Ammo tests are automatically passed (no roll is required) when reloading.","Power":"Can't be parried except by other Power weapons.A hit roll of 6 gives:Ignores Save rolls (except Field armour).+1 Damage (does not apply in combination with certain other traits like Toxin).If a weapon with this trait is used by a model being hidden, the model becomes revealed for this round.","Power Pack":"Doesn't take up any regular weapon slots. If also Melee, grants 1 bonus attack.0-2 weapons with this trait per fighter","Pulverise":"After inflicting an Injury roll, roll a D6. If the result is equal or higher than the target's Toughness, or a 6 (before modifiers), change an Injury dice from Flesh Wound to Serious Injury.","Rad-phage":"After fully resolving all hits, roll 4+ per fighter hit to inflict a single Flesh Wound.","Rapid Fire (X)":"A successful hit scores a number of hits equal to the number of bullet holes on the Firepower dice.","Reckless":"Ignores Target priority. Randomize the target from all eligible targets (friend & foe).","Rending":"If the wound roll is a 6+, +1 Damage.","Scarce":"Can't be reloaded - once Out of Ammo, this weapon can't be used again during the battle.","Scattershot":"If hit, inflict D6 wound rolls instead of 1.","Seismic":"Always pins a fighter. A vehicle hit must always make a Loss of Control test.A wound roll of 6 (before modifiers) ignores save rolls.","Sever":"Injury rolls inflicted with this weapon are automatically Out of Action.","Shield Breaker":"Ignore the effects of shields. Field armours must roll twice and apply the lowest result.","Shock":"If the hit roll is a 6 (before modifiers), the attack automatically wounds.","Shred":"Double the AP if the Wound roll is a 6 (before modifiers).","Sidearm":"Can be used for both ranged and close combat attacks.","Silent":"- Sneak Attack (scenario special rule): No test to see whether the alarm is raised when this weapon is fired.- Pitch Black (scenario special rule): A Hidden fighter is not Revealed when using this weapon.","Single Shot":"Can only be used once per battle.","Smoke":"Mark the hit location with a counter. The smoke extends 2.5\\\" vertically and horizontally from the centre and blocks LOS.","Template":"Applies to all weapons with range T (Template). Use the Flame template to determine how many targets are hit.","Toxin":"Instead of making a wound roll, roll equal to or higher than the Toughness to inflict an Injury roll (regardless of Wounds).","Twin-linked":"Re-roll any number of the ammo dice but must accept the result of the re-roll.","Unstable":"If the Ammo symbol is rolled when attacking, roll a 4+ or the attacker suffers a catastrophic overload and go Out of Action.","Unwieldy":"Ranged: A Shoot action counts as a Double action (instead of Basic).Melee: Requires 2 hands so a second weapon can't be used at the same time (dual wielding).","Versatile":"A fighter with a Versatile weapon does not need to be B2B with an enemy fighter to Engage and attack in melee.","Vortex":"A fighter who is hit must make an Initiative test. If successful, move them the shortest distance to avoid the Blast marker. Otherwise, they immediately go Out of Action. Any obstacles hit by the Vortex is removed from the battlefield. Any vehicle is wrecked and removed.At the start of each End Phase:1-2\tVortex vanishes. Remove the Blast marker.3-4\tVortex remains. Models touching it next round are hit.5-6\tMove the Vortex D6+2\" randomly. Models/terrain in its path or under it are hit.","Web":"A successful wound roll inflicts an automatic Seriously Injured result (Webbed). No save roll can be made. Roll for Recovery during the End phase and apply the result as normal, with the following exceptions:Flesh Wound: No longer webbed.Seriously Injured: Still webbed.Out of Action: 'Out Cold' (no Lasting Injury roll).","Whispering":"Cannot be unequipped, upgraded or be affected by the Disarm trait. When taking OOA an enemy with a Fight (Basic) action, gain an additional Fight (Basic) action.The weapon's owner cannot be removed from the Gang; if killed, roll a D6. 2-6: the weapon can be sold; 1: another fighter must equip it. If owner is taken OOA, also apply these effects:Have been OOA:1+: All the fighter's weapons gain the Reckless trait.2+: Whispering Weapon's Strength increases by 1.3+: Fighter starts every battle with the Insane condition.4: Fighter is killed.","Ablative overlay":"Improves save by 2 the first time, and by 1 the second time, then it is spent.","Archaeo-carapace":"Ancient tech granting 4+ save. Some lasting injuries grant bionics but risk insanity.","Armourweave":"Xenos tech granting 5+ save that cannot be reduced below 6+.","Carapace armour (light)":"4+ save.","Carapace armour (heavy)":"4+ save, 3+ vs front attacks. When charging: -1 Initiative, -1 Movement.","Ceramite shield":"+2 to save vs front attacks. Move action becomes Basic. Ignores the effect of the Melta trait vs front attacks. -1 weapon capacity. Can be equipped with a suit of armour.","Flak armour":"6+ save, 5+ vs Blast/Flame.","Gutterforged cloak":"6+ save, 5+ vs underhive perils or environmental effects.","Hazard suit":"6+ save, +3 Toughness vs Gas if wearing a respirator. Immune to Blaze/Rad-phage traits.","Mantle malifica":"5+ save. 4+ invulnerable save vs the effects of psychic powers but has to do a Willpower test in the end phase of each round or gets Insane.","Mesh armour":"5+ save.","Reflec shroud":"5+ save, ignores AP of las, plasma and melta weapons.","Scrap shield":"+1 to save vs Reaction attacks while Standing and Engaged. Can be equipped with a suit of armour.","Armoured bodyglove":"Improves save by 1, immune to Rad-phage, combinable with other armour except undersuit.","Furnace plates":"6+ save, 5+ from front.","Hardened flak armour":"6+ save, 5+ vs Blast/Flame, reduces AP by 1.","Layered flak armour":"5+ save, 4+ vs Blast/Flame.","Hardened layered flak armour":"5+ save, 4+ vs Blast/Flame, reduces AP by 1.","Incombustible hauberk":"5+ to ignore Blaze, +1 to extinguish, combinable with other armour.","Plate mail":"6+ save, 5+ from front and vs Blast.","Exo-suit":"This fighter has a 5+ armour save and is immune to the effects of Blaze and Rad-phage weapon traits. Ironhead Squat Prospectors only.","Conversion field":"Roll D6 when hit: on 5+, attack has no effect. All fighters within 3\" are hit by Flash, except wearer","Displacer field":"Roll a D6 per hit: on 4+, hit ignored and wearer moves distance equal to attack's Strength in random direction. Cannot end in terrain/hazards or within 1\" of enemy.","Refractor field":"Roll D6 when hit: on 5+, hit ignored. On successful save, roll D6: on 1, field burns out and is removed","Archaeotech device":"Ancient technological device with random effects determined by rolling on the Archaeotech Device table when purchased. New users must pass Intelligence test to activate.","Armoured undersuit":"Improves save by 1. Can be worn with any armour except armoured bodyglove. Grants 6+ save if no other save present.","Bio-booster":"First Injury roll each battle rolls one less dice. If only one dice would be rolled, roll two and discard one.","Bio-scanner":"Sentry can spot attackers outside vision arc. +1 to spotting rolls (natural 1 still fails).","Blind snake pouch":"Grants Dodge skill. If already has Dodge, succeeds on 5+. Against Overwatch, succeeds on 4+.","Cameleoline cloak":"If wearer did not move during activation, ranged attacks suffer -2 to hit until next activation.","Chem-synth":"At activation start, pass Intelligence test to reduce target's Toughness by 1 against Gas/Toxin weapons until end of activation.","Chrono-crystal":"Used according to scenario special rules.","Cred sniffer":"If fighter not Out of Action/Seriously Injured, earn 4D6 credits post-battle. Only one per gang.","Cult icon":"One per gang. Bearer with Group Activation can activate one additional Ready friendly fighter.","Data-thief":"At battle start, make opponent randomly reveal one gang tactic.","Dome runner map / Ratskin map":"Before scenario roll, use map to modify scenario selection. Effects determined by table roll.","Drop rig":"Allows Descend (Basic) action: move 3\" horizontally and 12\" vertically downward.","Dustback helamite":"Grants Mounted condition, Movement 8\", and Mighty Leap skill.","Escher cutter":"Grants Mounted condition. Movement increased to 9\", ignores terrain, free level movement, cannot fall. Cannot cross impassable terrain or end on obstacles/within 1\" of fighters. Includes Deploy Gas Trap Action to place gas trap within 1\" and move. Must select one weapon option that gains suspensors and doesn't use weapon slot: twin-linked grenade launchers (frag & krak) for 75 credits, twin-linked heavy stubbers for 200 credits, or twin-linked plasma guns for 110 credits.","Falsehood":"Cannot be targeted by attack/psychic power. Last until the end phase of the second round or if making an attack/psychic power.","Filter plugs":"+1 Toughness vs Gas weapons. Single use.","Frenzon collar":"Permanently under Frenzon effects. Leader/Champion with master motivator can group activate collared fighters anywhere on battlefield.","Forged guilder seal":"Reduces Trading Post Rarity by 2 and prices by 3D6 (min 10). Double 1 or double 6 on price roll causes discovery, loss of seal and Outlaw status.","Grapnel launcher":"Grapnel (Double) action: move 12\" straight line in any direction, including different levels.","Grav-chute":"No damage from falling or jumping down levels.","Guilder cartograph":"Can change Badzone Environment and place four loot caskets during deployment. Roll D6 post-battle, expires on 1-3.","Halo device":"Transfer Lasting Injury to another gang member, bearer counts as Out Cold instead.","Harrier-skulls":"Exotic Beasts must pass Intelligence test to attack bearer.","Hexagrammic fetish":"Roll D6: 1=useless (sell for 3D6), 2-5=-1 to Psyker Willpower tests, 6=-3 to Psyker Willpower tests.","Holochromatic field":"-2 to hit with ranged attacks, -1 in melee. Roll D6 each attack, deactivates on 1. Always counts as revealed in Pitch Black.","Industrial respirator":"Adds 3 to fighter's Toughness (4 if combined with Hazard Suit) vs Gas weapons. Once per battle can use air supply to gain immunity to Gas, act normally while on fire, and ignore breathing effects until next activation.","Lho sticks":"Friendly fighters with Intelligence 8+ within 6\" and LoS may use this fighter's Cool characteristic.","Lock-punch":"When taking Force Door action, add 4 to Strength. Doors opened are permanently damaged and removed.","Magnacles":"Attack (Basic) to lock enemy in base contact (requires failed Initiative test). Target cannot move, -2 to hit in melee, no ranged attacks. Break free with Break Bonds (Double) action, requires 2D6 \u2264 Strength (+2 per friendly in base contact).","Malefic artefact":"Roll D6 when purchased to determine type. New users must pass Intelligence test to activate. Effects vary by type (1-Cursed, 2-Whisper Vox, 3-Void Gate, 4-Aetheric Lantern, 5-Chronoscope, 6-Terror Telepathica).","Medicae kit":"When assisting friendly fighter's Recovery test, roll extra Injury dice and choose one to discard.","Mnemonic inload spike":"User rolls on Lasting Injuries table. If survives, gains one skill from Agility, Brawn, Combat, Cunning, Ferocity, Leadership, Savant or Shooting. Single use.","Photo-goggles":"Can attack through smoke, +9\" to Visibility (X\"), +1 to Flash weapon Blind tests.","Photo-lumen":"+9\" to Visibility (X\"). Cannot be Hidden when Visibility (X\") in effect, always Revealed.","Psi-grub":"Gains token when using/targeted by psychic power. Can attempt Tap Psi-grub (Basic) to use power without Willpower test if D6 \u2264 tokens. Explodes at 6 tokens.","Respirator":"+2 Toughness vs Gas weapons.","Sanctioning writ":"Place Bounty on Law Abiding gang member. Single use.","Second best":"Take a Swig (Simple) action, roll D6 (1-3 empties bottle). Gain Intoxicated marker, remove Flesh Wound. Effects vary by markers: 1(-1 hit/+1 Cool), 2(-2 hit/+2 Cool/Initiative test for moves), 3+(-3 ranged/-1 melee/+3 Cool/D6\" random movement).","Servo harness (partial)":"+2 Strength, +1 Toughness, Unwieldy weapons gain suspensors (Weapon Accessory). -1 Movement and Initiative.","Servo harness (full)":"+2 Strength, +1 Toughness, Unwieldy weapons gain suspensors (Weapon Accessory). No Movement/Initiative penalty.","Skinblade":"+2 to escape roll if Captured. Lost if successful.","Stimm-slug stash":"Once per battle at activation start: remove Flesh Wound, +2 Move/Strength/Toughness until round end. Roll D6 in End phase, on 1 roll Injury dice.","Strip kit":"+2 to Intelligence tests for door terminals or loot casket locks.","Suspensor harness":"Can carry 4 weapons (6 for Bounty Hunters). (*) weapons still count as two.","Threadneedle worms":"Can of Worms (Basic) action, single use. Roll D6: 1(user injury), 2-3 (5\" blast D6\" away), 4-5 (three connected 5\" blasts), 6 (all enemies roll an injury dice, OOA count as Seriously Injured).","Web solvent":"Roll an extra Injury dice for Webbed Recovery, choose one. When assisting, roll two extra dice.","Wild snake":"Take a Swig (Simple) action, roll D6 (1-2 empties bottle). Gain Intoxicated marker, remove Flesh Wound. Effects by markers: 1 (-1 hit/+2 Cool), 2 (-1 hit/+3 Cool/random targets), 3+ (auto pass Cool/-2 hit).","Xenoculum":"Roll D6 when purchased: 1(trap), 2(claws), 3(ghost form), 4(horror aura), 5(chem factory), 6(brain booster). New users must pass Intelligence test.","Arachni-rig jump boosters":"Once per activation during Move or Charge, adds 3\" to Movement. Up to half movement can be vertical. +1 to Hit rolls and Strength when charging.","Ash waste grav-cutter":"Increases Movement by 2\". Grants Mounted condition. Ignores terrain and moves freely between levels. -1 to cover modifiers against ranged attacks. Ignores Hands Full rule.","Ash cloak":"Counts as respirator. On 5+ ignore wound loss from battlefield conditions.","Augurspex":"Enemy fighters cannot be set up within 12\" as Reinforcements or using Infiltrate.","Book of the Redemption":"Can perform Words of Wrath (Basic) action to allow friendly Cawdor fighters within 6\" to re-roll Charge D3 or single natural 1 for Hit rolls.","Bomb delivery rats":"Deploy rats carrying grenades. Rats move 6\", ignore terrain except impassable. Detonate on 2+ when near fighters. Can be shot at with -1 to hit.","Camoelean elixir":"-2 to ranged hit rolls, -1 to close combat. If not carrying Unwieldy weapons and has 5+ armor save, can only be targeted within 6\" if didn't move last activation.","Draconic scales":"Armor save cannot be modified or negated by any rule or trait.","Grav-cutter":"+2\" Movement, ignores terrain, moves between levels freely. No Pinning from ranged attacks. -1 to cover modifiers. Must use Stand Up (Double) if Prone.","Jump booster":"Once per activation adds 3\" Movement in safe mode or D3+3\" when overcharged. Half movement can be vertical. +1 to Hit and Strength when charging.","Mirror aegis":"First hit each battle: on 2+ negate attack and relocate the holder of the mirror within 6\" but the mirror has no further effect in this battle. On 1, resolve attack as normal.","Proximity auspex":"Can perform Scan For Threats (Basic) action to make enemy model within 24\" Revealed until end of round.","Psychofamile pheromone":"Enemies within 3\" must pass Willpower test to attack them, or action is wasted.","Psychomancer's harness":"+2\" Movement, vertical distance not halved when climbing. Includes paired psychomantic claws. Limited to two non-Unwieldy weapons.","Pyromantic mantle":"Melee and Versatile weapons gain the Blaze trait during activation.","Radcounter":"Cannot be the random target of Events unless no other fighters available.","Ridge walker":"Grants Mounted condition. Movement increased to 9\". +1 to Initiative checks.","Refraction cloak":"-1 to ranged Hit rolls (-2 if the fighter didn't move in previous activation).","Rocket pack":"First Ammo check for charge caster within 3\" each battle automatically passes.","Servo-medicae":"Can perform Medicate (Basic) action to allow Seriously Injured friendly fighter within 1\" to make Recovery roll.","Sky mantle":"Can perform Hide in the Wastes (Double) to gain Hidden condition if 12\" from enemies, even without Pitch Black rules.","Vox array":"Gains Group Activation (1) special rule.","Waster's dirtbike":"Grants Mounted condition. Movement increased to 8\".","Venom sacs":"At the start of their activation, a Standing fighter may take an Initiative test. If passed, all Gas or Toxin weapons they use this activation reduce the target's Toughness by 1.","Treatment pouch":"Allows this fighter to perform a free Medical Escort post-battle action, even if they are not normally eligible. A roll of 6 is treated as Stabilised rather than Full Recovery.","Exotic furs":"When making a Trade action in post-battle, add +1 modifier to the Availability Level roll.","Gold-plated gun":"Any ranged weapon can be gold-plated. Improves Leadership by 1. Once per battle, may re-roll a failed Ammo test.","Master-crafted weapon":"Any weapon gains the Master-crafted trait. Cost is weapon cost plus 25%, rounded up to nearest 5 credits.","Opulent jewellery":"May re-roll the dice when determining the Doc's fee during Medical Escort action.","Uphive raiments":"If not In Recovery during post-battle, gain extra D3x10 credits during Collect Income step.","Sensor skull":"Grants bio-scanner benefits. When taking Aim (Basic) action, add 2 to hit rolls for subsequent shots in same activation.","Medi skull":"When making Recovery test, roll extra Injury dice and choose one to resolve.","Gun skull":"Equipped with autopistol. Rolls extra hit and Ammo dice when owner attacks. BS 5+, never benefits from aiming or modifiers.","Lobo chip - Mundane":"[Humiliated Lasting Injury] Mundane version increases either Leadership or Cool by +1.","Lobo chip - Improved":"[Humiliated Lasting Injury] Improved version increases both Leadership and Cool by +1.","Cortex-cogitator - Mundane":"[Head Injuries Lasting Injury] Mundane version increases either Intelligence or Willpower by +1.","Cortex-cogitator - Improved":"[Head Injuries Lasting Injury] Improved version increases both Intelligence and Willpower by +1.","Bionic eye - Mundane":"[Eye Injuries Lasting Injury] Increases the fighter's Ballistic Skill by +1","Bionic arm - Mundane":"[Hand Injuries Lasting Injury] Increases the fighter's Weapon Skill by +1","Bionic leg - Mundane":"[Hobbled Lasting Injury] Increases the fighter's Movement by +1\"","Skeletal enhancers - Mundane":"[Spinal Injury Lasting Injury] Increases the fighter's Strength by +1","Aortic supercharger - Mundane":"[Enfeebled Lasting Injury] Increases the fighter's Toughness by +1","Frenzon":"Grants Nerves of Steel, True Grit, Unstoppable and Berserk skills. All weapons gain Reckless trait. Must move toward nearest enemy or Charge if possible unless Standing and Engaged or Prone and Seriously Injured. Side effects: Toughness check in Wrap-up (+2 to roll) or become addicted. Addiction requires dose to be included in crew, curable with 2D6x10 credits anti-addiction chems.","Ghast":"Roll D6: On 1, become Insane. On 2-5, gain random Wyrd Power from the Wyrd Powers table. On 6, gain both. Side effects: Failed Willpower test reduces Willpower by 1. Natural 12 causes permanent Insane condition.","Icrotic slime":"Make characteristic checks for M, S, T, I, A, and Cl. Each success improves that characteristic by D3. Side effects: sets Ld, Int, and Will to 10+ if not worse. After battle, roll 2D6: 2 kills fighter, 3-11 puts Into Recovery, 12 causes a Lasting Injury but re-roll Bitter Enmity, Captured, Critical Injury and Memorable Death).","Kalma":"When making an action, roll 2D6+T: On 11 or less, the action is wasted. On 12+, shakes off effects. Can be used on captured fighters in Rescue scenario. No long-term effects.","Obscura":"Changes Movement to D6\", weapons gain Reckless. Must move full distance in straight line. Can attempt to shake off in End phase with 2D6+T roll of 12+. Side effects: Limits to one action per activation after wearing off. Toughness check in Wrap-up or become addicted. Addiction requires 4+ on D6 to be included in crew, curable with 2D6x10 credits anti-addiction chems.","'Slaught":"Improves WS and I to 2+, adds +1 to their Attack. Side effects: Toughness check in Wrap-up or become addicted. Addiction worsens WS/I to 5+ and A to 1 without dose, improves to WS/I 3+ with dose. Curable by voluntary Recovery.","Spur":"Increases M by 2 and improves I to 2+. Check if wears off in End phase with 2D6+T roll, on 10+ effects end.","Stinger mould":"Can be used after Lasting Injury roll to change result to Out Cold (except Memorable Death). Alternatively, can attempt to remove existing Lasting Injury on 5+ during post-battle sequence. No long-term effects.","Ammo cache":"Added to gang's Stash. At battle start, place within 1\" of fighter in deployment zone. If defending, roll D6: on 1-4 cache cannot be used, on 5-6 it can be used. Removed from Stash when placed.","Booby traps - frag":"Place marker at battle start. When model comes within 2\", roll D6: 1=dud (remove), 2-3=no effect, 4-6=explodes. Can be shot at (-1 Short/-2 Long), if booby trap is hit roll D6: 1-2=no effect, 3-4=triggers, 5-6=disarmed.","Booby traps - gas":"Place marker at battle start. When model comes within 2\", roll D6: 1=dud (remove), 2-3=no effect, 4-6=explodes. Can be shot at (-1 Short/-2 Long), if booby trap is hit roll D6: 1-2=no effect, 3-4=triggers, 5-6=disarmed.","Booby traps - melta":"Place marker at battle start. When model comes within 2\", roll D6: 1=dud (remove), 2-3=no effect, 4-6=explodes. Can be shot at (-1 Short/-2 Long), if booby trap is hit roll D6: 1-2=no effect, 3-4=triggers, 5-6=disarmed.","Isotropic fuel rod":"Can be used to convert any Territory into a Settlement Territory. Consumed when used.","Mung vase":"Status Item kept in Stash. Reduces Hired Gun cost by D6x10 (min 10). After battle, roll D6: on 1 both vase and Hired Gun disappear. Can be sold in post-battle. Lost if gang Leader dies.","Corpse grinder cult icon":"One per gang, Leader/Champion only. Action - Enrage: All friendly Standing and Active fighters within 6\" with Ready marker add D3\" to Move until End phase.","Caryatid":"0-1. Any Gang Leader.","Grapplehawk":"0-2. Any Gang Leader or Champion.","Gyrinx Cat":"0-1. Any Gang Leader or Champion.","Hacked Cyber-mastiff":"0-1. Any Gang Leader or Champion.","Necromundan Giant Rat":"0-3. Any Gang Leader or Champion.","Cherub-servitor":"Any Redemptionist Gang Leader or Champion.","Sheen Bird":"Any Cawdor Gang Leader or Champion.","Cephalopod Spekter":"0-3. Any Gang Leader, Champion or Psy-Gheist (Prospect).","Psychoteric Wyrm":"0-2. Any Psy-Gheist (Prospect).","Phyrr Cat":"0-2. Any Gang Leader, Champion.","Phelynx":"0-3. Any Escher Wyld Runner (Prospect).","Sumpkroc":"0-1. Any Gang Leader or Champion","Cyber-Mastiff":"0-2. Any Gang Leader or Champion","Cyberachnid":"0-3. Any Gang Leader or Champion.<br />0-2 for Augmek (Champion)","Hardcase Cyber-Mastiff":"0-2. Any Gang Leader or Champion.","Psychic Familiar":"0-3. Any Gang Leader or Champion.","Chaos Familiar":"0-2. Any Gang Leader or Champion.","Techmite Autoveyor":"0-2. Any Gang Leader or Champion.","Techmite Exovator 078B":"0-2. Any Gang Leader or Champion.","Techmite Oculi":"0-2. Any Gang Leader or Champion.","Caryatid Prime":"0-1. Any Gang Leader or Champion.","Ablative armour":"First non-Glancing Hit to Body location in each battle counts as Glancing Hit.","Chrono-cradle":"Allows mounting a Chrono-crystal on the vehicle.","Crash cage":"First non-Glancing Hit to Crew location in each battle counts as Glancing Hit.","Electrified hull":"Fighters on hull (not transport bed) suffer S3, AP-, D1 hit with Shock trait.","Electrostatic projector":"Basic Action: Roaming Horrors within 18\" may only perform one action this round.","Escape hatches":"May re-roll results on the Lasting Injury table for crew.","Explosive ram":"First head-on collision causes additional S5, AP-2, D2 hit.","Extra armour":"Increases Toughness by 1 in all locations.","Ram":"Adds 1 to Strength, AP and Damage of Front arc vehicle impacts.","Reinforced armour":"Increases starting HP by 1.","Rockgrinder ram":"Adds 2 to Strength, AP and Damage of Front arc vehicle impacts.","Speed fins":"If no turns made during activation, increase Movement by 1\". Cannot be taken by Walkers.","Transport bed":"Fighters in defined area don't check falling when vehicle moves. Not for Walkers. Capacity based on physical space.","Transport cage - Small":"Enclosed cab for transporting fighters. Small holds 3 fighters, large holds 6. Requires access point. Fighters can Embark/Disembark as Basic action.","Transport cage - Large":"Enclosed cab for transporting fighters. Small holds 3 fighters, large holds 6. Requires access point. Fighters can Embark/Disembark as Basic action.","Turtle back":"On failed Loss of Control roll, loses 2 HP and auto-rights instead of becoming Wrecked.","Weapon hardpoint":"Adds one Weapon Hardpoint. Can be taken multiple times.","Weapons stash":"Vehicle counts as an Ammo Cache.","All-wheel steering":"Increases Handling by 1. Cannot be taken by Skimmers or Walkers.","Antigrav generators":"Gains Skimmer special rule, replacing current Locomotion rule.","Emergency brake":"Halve distance moved due to failed Loss of Control. Cannot be taken by Walkers.","Pneumatic radials":"No movement penalty in difficult terrain. Only for Wheeled vehicles.","Powered steering":"Can make two 90\u00b0 turns during Move action. Not for Skimmers or Walkers.","Redundant drive system":"First non-Glancing Hit to Drive location counts as Glancing Hit. Not for Walkers.","Tyre claws":"Increases Handling by 1. Only for Wheeled vehicles.","Archaeotech automantic reactor":"Increases Movement by 2\". When Wrecked, explodes causing S5, AP-1, D1 hits within 3\".","Easy turnover":"+1 modifier to engine restart checks.","Engine shell":"First non-Glancing Hit to Engine location counts as Glancing Hit.","Gas promethium engine":"Models within 1\" during movement suffer S3, AP-1, D1 hit with Blaze.","Glys injector":"Once per battle, increase Movement by 4\" for one activation.","Nitro burner":"Increases Movement by 1\".","Plasma coil engine":"Can increase Movement by 2\". On a roll of 1 after activation, lose 1 HP.","Smoke vents":"-1 to hit penalty for ranged attacks. Ignored by weapons ignoring Smoke trait.","Boarding ramp":"Fighters jumping from this vehicle to another within 3\" add 1 to Initiative check.","Body spikes":"Fighters moving on vehicle (except Transport area) must pass Initiative test or suffer S3, AP -, D1 hit. Does not pin.","Booby-trapped fuel tanks":"When Wrecked, roll D6 when fighter moves within 3\". On 5+ explodes: S6, AP -1, D1 hit with Blaze to all within 5\". Remove and roll Lasting Damage.","Caltrop launcher":"Lay Caltrops (Basic): Move straight forward, place 3 markers in Rear arc within 1\". Wheeled vehicles within 1\" make -2 Loss of Control test.","Chrono-static compass":"-1 to Roaming Horrors generation while on battlefield.","Flare launchers":"Launch Flares (Basic): All models within 12\" gain Revealed until End phase.","Headlights":"Toggle at activation start. When on, reveals all models within 12\" in LoS and Front arc. Vehicle also becomes Revealed.","Kill switch":"-1 to Lasting Damage roll if Wrecked by Engine hit.","Malstrain kill markings":"+1 BS when targeting Roaming Horror fighters.","Minelayer":"One use per battle. Lay Mine (Basic): Move straight forward, place melta trap in Rear arc within 1\". Additional mines (20 credits each) grant extra uses.","Searchlight":"Illuminate (Free): Target enemy within 30\" gains Revealed until next activation. This model also becomes Revealed.","Smoke launchers":"Launch Smoke (Basic): Place three smoke grenade markers within 2\".","Wheel scythes":"Models within 1\" take S3, AP -, D1 hit. Fighters are Pinned. Wheeled vehicles only.","Focusing crystal (Lasgun, Laspistol, Long las only)":"For las weapons only. Improves AP by 2. Gains Unstable trait.","Gunshroud":"A weapon gains the Silent trait.","Hotshot las pack (Lasgun and Laspistol only)":"Increases Strength to 4 and AP to -1. Loses Plentiful trait and Ammo reduced to 4+.","Infra-sight (Pistols, Basic, Special and Heavy Weapons)":"Cannot be fitted to Rapid Fire or Blast weapons. Can attack through smoke, increases Visibility by 9\". No penalty for partial cover, -1 for full cover.","Las-projector (Pistols, Basic and Special Weapons)":"Short range accuracy bonus improved by 1.","Mono-sight (Basic, Special and Heavy Weapons)":"Add 2 to hit roll instead of 1 when making an Aim action.","Psi-amplifier (Melee Weapons)":"Requires Psi Attune post-battle action (15+ on Trade roll). Weapon gains Force trait.","Suspensors (Weapons with the Unwieldy trait only)":"Ranged: becomes Basic action. Melee: can be used single-handed.","Telescopic sight (Pistols, Basic and Special Weapons)":"When using Aim action, Short range accuracy applies at Long range.","Electrostatic generator (Blast carbine, Blast rifle And Heavy blaster only)":"A weapon with an electrostatic generator gains Haywire."};

function normaliseRuleName(name) {
  const patterns = [
    [/^(Group Activation)\s*\(\d+\)$/i, '$1 (X)'],
    [/^(Rapid Fire)\s*\(\d+\)$/i, '$1 (X)'],
    [/^(Gang Fighter)\s*\(\w+\)$/i, '$1 (X)'],
    [/^(Promotion)\s*\(.+\)$/i, '$1 (X)'],
    [/^Blast\s*\(.+\)$/i, 'Blast (3"/5"/*)'],
    [/^(Devout Masses)\s*\(.+\)$/i, '$1 (X)'],
    [/^(Tools of the Trade)\s*\(.+\)$/i, '$1'],
  ];
  for (const [pat, repl] of patterns) {
    if (pat.test(name)) return name.replace(pat, repl);
  }
  return name;
}

function getRuleDesc(name) {
  const norm = normaliseRuleName(name);
  return RULES[norm] || RULES[name] || null;
}

let accessToken = null;
let userId = null;

function parseJwt(token) {
  return JSON.parse(atob(token.split('.')[1]));
}

function show(id) {
  ['login-screen','gang-screen','sheet-screen'].forEach(s =>
    document.getElementById(s).style.display = s === id ? (id === 'login-screen' ? 'flex' : 'block') : 'none'
  );
}

function api(path) {
  return fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: {
      'apikey': ANON_KEY,
      'Authorization': `Bearer ${accessToken}`,
    }
  }).then(r => r.json());
}

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const err = document.getElementById('login-error');
  err.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'apikey': ANON_KEY, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.msg || data.error_description || 'Login failed');
    accessToken = data.access_token;
    userId = parseJwt(accessToken).sub;
    show('gang-screen');
    loadGangs();
  } catch (e) {
    err.textContent = e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

async function loadGangs() {
  const list = document.getElementById('gang-list');
  list.innerHTML = '<div class="loading">Loading gangs…</div>';
  const gangs = await api(`gangs?user_id=eq.${userId}&select=id,name,gang_type,rating,credits,reputation,alignment&order=name`);
  if (!gangs.length) { list.innerHTML = '<div class="loading">No gangs found.</div>'; return; }
  list.innerHTML = gangs.map(g => `
    <div class="gang-item" onclick="loadSheet('${g.id}')">
      <div>
        <div class="gang-name">${esc(g.name)}</div>
        <div class="gang-meta">${esc(g.gang_type)} · ${g.alignment || ''}</div>
      </div>
      <div class="gang-rating">Rating ${g.rating}</div>
    </div>
  `).join('');
}

function showGangPicker() { show('gang-screen'); }
function logout() { accessToken = null; show('login-screen'); }

const CLASS_ORDER = { Leader: 0, Champion: 1, Specialist: 2, Ganger: 3, Crew: 4, Juve: 5 };

async function loadSheet(gangId) {
  show('sheet-screen');
  const grid = document.getElementById('fighters-grid');
  grid.innerHTML = '<div class="loading">Loading…</div>';
  try {
    const [gangs, fighters, allEquipment] = await Promise.all([
      api(`gangs?id=eq.${gangId}&select=id,name,gang_type,credits,rating,reputation,alignment,gang_origins(origin_name)`),
      api(`fighters?gang_id=eq.${gangId}&select=id,fighter_name,fighter_type,fighter_class,movement,weapon_skill,ballistic_skill,strength,toughness,wounds,initiative,attacks,leadership,cool,willpower,intelligence,credits,xp,kills,special_rules,killed,recovery&order=credits.desc`),
      api(`fighter_equipment?gang_id=eq.${gangId}&gang_stash=eq.false&select=id,fighter_id,equipment_id,equipment(equipment_name,equipment_type,equipment_category,cost)`),
    ]);

    if (!Array.isArray(fighters) || !Array.isArray(allEquipment)) throw new Error('Unexpected API response');

    const fighterIds = fighters.map(f => f.id);
    const allSkills = fighterIds.length
      ? await api(`fighter_skills?fighter_id=in.(${fighterIds.join(',')})&select=fighter_id,skills(name)`)
      : [];

    if (!Array.isArray(gangs) || !gangs[0]) throw new Error('Gang not found');
    if (!Array.isArray(allSkills)) throw new Error('Skills query failed: ' + JSON.stringify(allSkills));

    const gang = gangs[0];
    document.getElementById('sheet-gang-name').textContent = gang.name;
    const originName = gang.gang_origins?.origin_name;
    document.getElementById('sheet-gang-type').textContent = [gang.gang_type, gang.alignment, originName].filter(Boolean).join(' · ');
    renderPathSection(originName);
    document.getElementById('sheet-gang-stats').innerHTML = [
      ['Rating', gang.rating],
      ['Credits', gang.credits],
      ['Rep', gang.reputation],
    ].map(([l,v]) => `<div class="gang-stat"><div class="val">${v}</div><div class="lbl">${l}</div></div>`).join('');

    // Weapon profiles for all weapons on this gang
    const weaponEquipIds = [...new Set(
      allEquipment
        .filter(e => e.equipment?.equipment_type === 'weapon')
        .map(e => e.equipment_id)
    )];

    let profilesByEquipId = {};
    if (weaponEquipIds.length) {
      const profiles = await api(
        `weapon_profiles?weapon_id=in.(${weaponEquipIds.join(',')})&select=weapon_id,profile_name,range_short,range_long,acc_short,acc_long,strength,ap,damage,ammo,traits&order=sort_order`
      );
      if (Array.isArray(profiles)) {
        for (const p of profiles) {
          if (!profilesByEquipId[p.weapon_id]) profilesByEquipId[p.weapon_id] = [];
          profilesByEquipId[p.weapon_id].push(p);
        }
      }
    }

    // Group equipment by fighter
    const equipByFighter = {};
    for (const row of allEquipment) {
      if (!equipByFighter[row.fighter_id]) equipByFighter[row.fighter_id] = [];
      equipByFighter[row.fighter_id].push(row);
    }

    // Group skills by fighter
    const skillsByFighter = {};
    for (const row of allSkills) {
      if (!skillsByFighter[row.fighter_id]) skillsByFighter[row.fighter_id] = [];
      if (row.skills?.name) skillsByFighter[row.fighter_id].push(row.skills.name);
    }

    // Sort fighters
    const sorted = [...fighters].sort((a, b) => {
      const ao = CLASS_ORDER[a.fighter_class] ?? 99;
      const bo = CLASS_ORDER[b.fighter_class] ?? 99;
      return ao !== bo ? ao - bo : b.credits - a.credits;
    });

    grid.innerHTML = sorted.map(f =>
      renderFighter(f, equipByFighter[f.id] || [], profilesByEquipId, skillsByFighter[f.id] || [])
    ).join('');

  } catch(e) {
    grid.innerHTML = `<div class="loading" style="color:#e07070">Error: ${esc(e.message)}</div>`;
    console.error(e);
  }
}

function renderPathSection(originName) {
  const el = document.getElementById('sheet-path-section');
  const path = originName && CAWDOR_PATHS.paths[originName];
  if (!path) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div class="path-section">
      <h3>${esc(originName)}</h3>
      <div class="path-desc">${esc(path.description)}</div>
      <div class="articles-grid">
        ${path.articles.map(a => `
          <div class="article-entry">
            <span class="art-threshold">${esc(a.threshold)}</span>
            <span class="art-name">${esc(a.name)}</span>
            <span class="art-desc"> — ${esc(a.description)}</span>
          </div>`).join('')}
      </div>
    </div>`;
}

function renderFighter(f, equipRows, profilesByEquipId, skills) {
  const cls = f.fighter_class || 'Ganger';
  const stats = [
    ['M', f.movement + '"'],
    ['WS', f.weapon_skill + '+'],
    ['BS', f.ballistic_skill + '+'],
    ['S', f.strength],
    ['T', f.toughness],
    ['W', f.wounds],
    ['I', f.initiative + '+'],
    ['A', f.attacks],
    ['Ld', f.leadership + '+'],
    ['Cl', f.cool + '+'],
    ['Wil', f.willpower + '+'],
    ['Int', f.intelligence + '+'],
  ];

  const weapons = equipRows.filter(e => e.equipment?.equipment_type === 'weapon');
  const wargear = equipRows.filter(e => e.equipment?.equipment_type === 'wargear');
  const specialRules = (f.special_rules || []);

  // Collect all rule names from special rules, skills, weapon traits, wargear
  const ruleNames = new Set();
  for (const sr of specialRules) ruleNames.add(sr);
  for (const s of skills) ruleNames.add(s);
  for (const w of weapons) {
    const profiles = profilesByEquipId[w.equipment_id] || [];
    for (const p of profiles) {
      if (p.traits) p.traits.split(',').map(t => t.trim()).forEach(t => ruleNames.add(t));
    }
  }
  for (const g of wargear) ruleNames.add(g.equipment.equipment_name);
  // Build resolved rule entries (name + description), deduped, only those with a description
  const ruleEntries = [...ruleNames]
    .map(n => ({ name: n, desc: getRuleDesc(n) }))
    .filter(r => r.desc)
    .sort((a, b) => a.name.localeCompare(b.name));

  const statusParts = [];
  if (f.xp) statusParts.push(`XP: <span class="val">${f.xp}</span>`);
  if (f.kills) statusParts.push(`Kills: <span class="val">${f.kills}</span>`);
  if (f.recovery) statusParts.push(`<span class="recovery-tag">RECOVERY</span>`);
  statusParts.push(`Cost: <span class="val">${f.credits}cr</span>`);

  return `
<div class="fighter-card${f.killed ? ' dead' : ''}${f.recovery ? ' recovery' : ''}">
  <div class="card-header ${cls}">
    <div class="fighter-name ${cls}">${esc(f.fighter_name)}</div>
    <div class="fighter-type-label">${esc(f.fighter_type)}</div>
  </div>
  <div class="stat-row">
    ${stats.map(([k,v]) => `<div class="stat-cell"><span class="sv">${v}</span><span class="sk">${k}</span></div>`).join('')}
  </div>
  ${statusParts.length ? `<div class="status-row">${statusParts.join(' · ')}</div>` : ''}
  ${weapons.length ? `
  <div class="section">
    <div class="section-title">Weapons</div>
    ${weapons.map(e => renderWeapon(e, profilesByEquipId)).join('')}
  </div>` : ''}
  ${wargear.length ? `
  <div class="section">
    <div class="section-title">Wargear</div>
    <div class="wargear-list">
      ${wargear.map(e => `<span class="wargear-tag">${esc(e.equipment.equipment_name)}</span>`).join('')}
    </div>
  </div>` : ''}
  ${skills.length ? `
  <div class="section">
    <div class="section-title">Skills</div>
    <div class="skills-list">
      ${skills.map(s => `<span class="skill-tag">${esc(s)}</span>`).join('')}
    </div>
  </div>` : ''}
  ${ruleEntries.length ? `
  <div class="section">
    <div class="section-title">Rules Reference</div>
    ${ruleEntries.map(r => `<div class="rule-entry"><span class="rule-name">${esc(r.name)}</span> <span class="rule-desc">${esc(r.desc)}</span></div>`).join('')}
  </div>` : ''}
</div>`;
}

function renderWeapon(equipRow, profilesByEquipId) {
  const name = equipRow.equipment.equipment_name;
  const profiles = profilesByEquipId[equipRow.equipment_id] || [];

  if (!profiles.length) {
    return `<div class="weapon-block"><div class="weapon-name">${esc(name)}</div></div>`;
  }

  // Single profile with same name as weapon — skip redundant name row
  const showProfileName = profiles.length > 1 || (profiles[0]?.profile_name && profiles[0].profile_name !== name);

  return `<div class="weapon-block">
    <div class="weapon-name">${esc(name)}</div>
    <table class="profile-table">
      <tr>
        ${showProfileName ? '<th></th>' : ''}
        <th>Rng S</th><th>Rng L</th><th>Acc S</th><th>Acc L</th>
        <th>Str</th><th>AP</th><th>D</th><th>Am</th><th class="traits-cell">Traits</th>
      </tr>
      ${profiles.map(p => `<tr>
        ${showProfileName ? `<td class="profile-name-cell">${esc(p.profile_name || '')}</td>` : ''}
        <td>${p.range_short||'-'}</td><td>${p.range_long||'-'}</td>
        <td>${p.acc_short||'-'}</td><td>${p.acc_long||'-'}</td>
        <td>${p.strength||'-'}</td><td>${p.ap||'-'}</td>
        <td>${p.damage||'-'}</td><td>${p.ammo||'-'}</td>
        <td class="traits-cell">${esc(p.traits||'')}</td>
      </tr>`).join('')}
    </table>
  </div>`;
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
